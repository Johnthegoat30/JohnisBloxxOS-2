<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Money Clicker</title>\n    <script>\n        let money = 0;\n        let rebirthLevel = parseInt(localStorage.getItem('rebirthLevel')) || 0;\n        let multiplier = 1 + (rebirthLevel * 0.1);\n\n        function rebirth() {\n            money = 0;\n            rebirthLevel++;\n            localStorage.setItem('rebirthLevel', rebirthLevel);\n            updateDisplay();\n        }\n\n        function updateDisplay() {\n            document.getElementById('money').innerText = 'Money: ' + money;\n            document.getElementById('rebirthLevel').innerText = 'Rebirth Level: ' + rebirthLevel;\n        }\n\n        window.onload = function() {\n            updateDisplay();\n        };\n    <\/script>\n</head>\n<body>\n    <h1>Money Clicker</h1>\n    <div id="money">Money: 0</div>\n    <div id="rebirthLevel">Rebirth Level: 0</div>\n    <button onclick="rebirth()">Rebirth</button>\n</body>\n</html>
